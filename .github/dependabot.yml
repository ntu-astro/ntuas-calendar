version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    groups:
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint"
          - "prettier"
      test-runner:
        patterns:
          - "vitest"
          - "@playwright/test"
      types:
        patterns:
          - "@types/*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
