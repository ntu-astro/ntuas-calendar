<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUAS | Club Event Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f7f7f5;
            --bg-hover: #f0f0f0;
            --text-primary: #111111;
            --text-secondary: #60605c;
            --text-tertiary: #9b9b97;
            --accent-red: #eb5757;
            --accent-red-light: rgba(235, 87, 87, 0.08);
            --accent-blue: #2383e2;
            --accent-blue-hover: #1b6ec2;
            --accent-blue-light: rgba(35, 131, 226, 0.08);
            --border: rgba(0, 0, 0, 0.06);
            --border-strong: #e0e0de;
            --radius-sm: 4px;
            --radius-md: 6px;
            --left-sidebar-width: 260px;
            --mini-cal-cell: 28px;
            --topbar-height: 44px;
            --month-heading-height: 36px;
            --daynames-height: 32px;
            --header-height: calc(var(--topbar-height) + var(--month-heading-height) + var(--daynames-height));
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ─── TOOLBAR ICON BUTTONS ─── */
        .toolbar-icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .toolbar-icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* ─── SIDEBAR TOOLBAR ─── */
        .sidebar-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        /* ─── CALENDAR HEADER (sticky block: controls + month + day names) ─── */
        .calendar-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--bg-main);
            flex-shrink: 0;
        }

        /* ─── CALENDAR TOP BAR (controls row) ─── */
        .calendar-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 8px 16px;
            min-height: var(--topbar-height);
            gap: 8px;
        }

        .calendar-top-left {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        /* ─── MONTH HEADING ROW ─── */
        .month-heading-row {
            padding: 2px 16px 8px 16px;
        }

        .calendar-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .calendar-top-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-month-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-month-arrows {
            display: flex;
            flex-direction: row;
            gap: 2px;
        }

        .nav-month-arrows button {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .nav-month-arrows button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        #monthLabel {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            user-select: none;
            white-space: nowrap;
        }

        #todayBtn {
            font-size: 12px;
            font-weight: 500;
            padding: 2px 10px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            height: 26px;
            display: flex;
            align-items: center;
        }

        #todayBtn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-subscribe {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: 0 12px;
            height: 30px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-subscribe:hover {
            background: var(--accent-blue-hover);
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            padding: 0 12px;
            height: 30px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-copy.copied {
            border-color: #1a7f37;
            color: #1a7f37;
        }

        .admin-link {
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
            white-space: nowrap;
        }

        .admin-link:hover {
            color: var(--text-secondary);
            background: var(--bg-hover);
        }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            display: grid;
            grid-template-columns: var(--left-sidebar-width) 1fr 280px;
            flex: 1;
            overflow: hidden;
        }

        /* ─── LEFT SIDEBAR ─── */
        .left-sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .mini-cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .mini-cal-month-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            user-select: none;
        }

        .mini-cal-nav-group {
            display: flex;
            gap: 2px;
        }

        .mini-cal-nav {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .mini-cal-nav:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .mini-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, var(--mini-cal-cell));
            gap: 1px 0;
        }

        .mini-cal-day-name {
            width: var(--mini-cal-cell);
            height: var(--mini-cal-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-tertiary);
            user-select: none;
        }

        .mini-cal-day {
            width: var(--mini-cal-cell);
            height: var(--mini-cal-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.12s;
            user-select: none;
        }

        .mini-cal-day:hover:not(.today) {
            background: var(--bg-hover);
        }

        .mini-cal-day.other-month {
            color: var(--text-tertiary);
        }

        .mini-cal-day.today {
            background: var(--accent-red);
            color: #fff;
            font-weight: 600;
        }

        /* ─── EVENT CATEGORIES ─── */
        .event-categories {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            margin: 0 -8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            user-select: none;
            transition: background 0.12s;
        }

        .category-item:hover {
            background: var(--bg-hover);
        }

        .category-item.inactive .category-label {
            color: var(--text-tertiary);
        }

        .category-item.inactive .category-icon {
            background: transparent;
            box-shadow: inset 0 0 0 1.5px var(--cat-color);
        }

        .category-icon {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
            background: var(--cat-color-light);
            box-shadow: inset 0 0 0 1.5px var(--cat-color);
            transition: background 0.12s, box-shadow 0.12s;
        }

        .category-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .category-eye {
            width: 16px;
            height: 16px;
            margin-left: auto;
            opacity: 0;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.12s;
        }

        .category-item:hover .category-eye,
        .category-item.inactive .category-eye {
            opacity: 1;
        }

        .category-eye svg {
            width: 16px;
            height: 16px;
            display: none;
        }

        .category-eye .eye-open {
            display: block;
        }

        .category-item.inactive .category-eye .eye-open {
            display: none;
        }

        .category-item.inactive .category-eye .eye-slash {
            display: block;
        }

        /* ─── LEFT SIDEBAR FOOTER ─── */
        .left-sidebar-spacer {
            flex: 1;
            min-height: 16px;
        }

        .left-sidebar-footer {
            border-top: 1px solid var(--border-strong);
            margin: 10px -16px 0;
            padding: 10px 16px 0;
        }

        .help-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-strong);
            background: transparent;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .help-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* ─── CALENDAR AREA ─── */
        .calendar-area {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-anchor: auto;
            padding: 0;
            position: relative;
            scroll-snap-type: y proximity;
            scroll-padding-top: var(--header-height);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .calendar-area::-webkit-scrollbar {
            display: none;
        }

        /* ─── DAY NAMES ROW (inside sticky header) ─── */
        .day-names-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
        }

        .calendar-day-name {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-tertiary);
            letter-spacing: 0.01em;
            padding: 8px 12px;
            user-select: none;
            text-align: center;
        }

        /* ─── SCROLL CONTAINER ─── */
        .scroll-container {
            flex: 1;
        }

        /* ─── (month sections removed for continuous grid) ─── */

        /* ─── WEEK ROW ─── */
        .week-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            scroll-snap-align: start;
        }

        /* ─── SENTINEL ─── */
        .sentinel {
            height: 1px;
            overflow-anchor: none;
        }

        /* ─── CALENDAR DAY ─── */
        .calendar-day {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.12s;
            overflow: hidden;
            position: relative;
            /* 6 rows: fill available height */
            height: calc((100vh - var(--header-height)) / 6);
            min-height: 80px;
        }

        .calendar-day:nth-child(7) {
            border-right: none;
        }

        .calendar-day.other-month-day .day-number {
            color: rgba(17, 17, 17, 0.32);
        }

        .calendar-day.weekend-day {
            background: rgba(0, 0, 0, 0.018);
        }

        .calendar-day.weekend-day:hover {
            background: var(--bg-hover);
        }

        .calendar-day.other-month-day.weekend-day {
            background: rgba(0, 0, 0, 0.03);
        }

        .calendar-day:hover {
            background: var(--bg-hover);
        }

        .calendar-day.selected {
            background: var(--accent-blue-light);
        }

        .calendar-day.selected:hover {
            background: rgba(35, 131, 226, 0.12);
        }

        .day-number {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 4px;
            align-self: flex-end;
        }

        .day-number.first-of-month,
        .today-marker.first-of-month {
            font-weight: 600;
        }

        .today-marker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: var(--accent-red);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            line-height: 1;
            margin-bottom: 4px;
            align-self: flex-end;
        }

        .event-chip {
            font-size: 10px;
            padding: 1px 5px;
            background: var(--accent-blue-light);
            color: var(--accent-blue);
            border-radius: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
            line-height: 1.5;
            font-weight: 500;
        }

        .event-chip-more {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 1px;
            padding-left: 2px;
        }

        /* ─── SIDEBAR DETAIL VIEW ─── */
        .sidebar-detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        .sidebar-back-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }

        .sidebar-back-btn:hover {
            color: var(--accent-blue-hover);
        }

        #eventDetailView .detail-date-heading {
            font-size: 11px;
            margin-bottom: 10px;
        }

        #eventDetailView .detail-row {
            flex-direction: column;
            gap: 2px;
        }

        #eventDetailView .detail-label {
            min-width: unset;
        }

        .detail-date-heading {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .detail-event-card {
            margin-bottom: 16px;
        }

        .detail-event-card:last-child {
            margin-bottom: 0;
        }

        .detail-event-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .detail-badge {
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-confirmed {
            background: #e6f4ea;
            color: #1a7f37;
        }

        .badge-tentative {
            background: #fff8e1;
            color: #9a6700;
        }

        .badge-cancelled {
            background: #ffeef0;
            color: #cf222e;
        }

        .detail-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 4px;
            font-size: 13px;
            line-height: 1.5;
        }

        .detail-label {
            color: var(--text-tertiary);
            font-weight: 500;
            min-width: 64px;
            font-size: 12px;
        }

        .detail-value {
            color: var(--text-primary);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .detail-value a {
            color: var(--accent-blue);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-color: rgba(35, 131, 226, 0.3);
        }

        .detail-value a:hover {
            text-decoration-color: var(--accent-blue);
        }

        /* ─── RIGHT SIDEBAR ─── */
        .sidebar {
            background: #ffffff;
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 12px 0;
        }

        .event-item {
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.12s;
            margin: 0 -8px;
        }

        .event-item:hover {
            background: var(--bg-hover);
        }

        .event-item+.event-item {
            border-top: 1px solid var(--border);
        }

        .event-date {
            color: var(--text-tertiary);
            font-weight: 500;
            font-size: 11px;
            margin-bottom: 2px;
        }

        .event-title {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 13px;
        }

        .no-events {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1099px) {
            .left-sidebar {
                display: none;
            }

            .main-content {
                grid-template-columns: 1fr 280px;
            }

            .calendar-toolbar {
                display: flex !important;
            }
        }

        @media (max-width: 899px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 240px;
            }

            .calendar-day {
                min-height: 64px;
            }
        }

        @media (max-width: 599px) {
            .calendar-top-bar {
                flex-wrap: wrap;
                padding: 6px 12px;
                gap: 6px;
            }

            .calendar-area {
                padding: 0;
            }

            .calendar-day {
                min-height: 48px;
                padding: 4px;
            }

            .event-chip {
                display: none;
            }

            .event-chip-more {
                display: none;
            }

            /* Fallback dot indicator on mobile */
            .calendar-day.has-event .day-number::after {
                content: '';
                display: inline-block;
                width: 4px;
                height: 4px;
                background: var(--accent-blue);
                border-radius: 50%;
                margin-left: 3px;
                vertical-align: middle;
            }

            .calendar-day.has-event .today-marker::after {
                content: '';
                display: inline-block;
                width: 4px;
                height: 4px;
                background: #fff;
                border-radius: 50%;
                margin-left: 3px;
                vertical-align: middle;
            }

            #monthLabel {
                font-size: 18px;
            }
        }

        /* ─── SEARCH OVERLAY ─── */
        .search-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 18vh;
            background: rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .search-modal {
            width: 540px;
            max-width: calc(100vw - 32px);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.16), 0 0 0 1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transform: translateY(-12px) scale(0.98);
            transition: transform 0.2s ease;
        }

        .search-overlay.active .search-modal {
            transform: translateY(0) scale(1);
        }

        .search-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-input-row svg {
            color: var(--text-tertiary);
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 17px;
            font-weight: 400;
            color: var(--text-primary);
            background: transparent;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-input-clear {
            width: 20px;
            height: 20px;
            border: none;
            background: var(--text-tertiary);
            color: #fff;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
            line-height: 1;
        }

        .search-input-clear.visible {
            display: flex;
        }

        .search-results {
            max-height: 340px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .search-results::-webkit-scrollbar {
            width: 6px;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        .search-section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 10px 16px 4px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .search-result-item:hover,
        .search-result-item.focused {
            background: var(--bg-hover);
        }

        .search-result-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--accent-blue);
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-result-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-empty {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .search-hint {
            padding: 8px 16px 12px;
            font-size: 12px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-hint kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-hover);
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            font-family: inherit;
            font-size: 10px;
            min-width: 20px;
            height: 18px;
            padding: 0 4px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="main-content">
        <aside class="left-sidebar" id="leftSidebar">
            <div class="sidebar-toolbar">
                <button class="toolbar-icon-btn" id="toggleSidebar" aria-label="Toggle sidebar">

                            fill="none" />
                        <line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.25" />
                    </svg>
                </button>
                <button class="toolbar-icon-btn" id="searchBtn" aria-label="Search">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" />
                        <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />

                </button>
            </div>
            <div class="mini-cal-header">
                <span class="mini-cal-month-label" id="miniCalMonth">Loading...</span>
                <div class="mini-cal-nav-group">
                    <button class="mini-cal-nav" id="miniCalPrev" aria-label="Previous month">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                            <path d="M2 7L5 3L8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <button class="mini-cal-nav" id="miniCalNext" aria-label="Next month">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                            <path d="M2 3L5 7L8 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="mini-cal-grid" id="miniCalGrid"></div>
            <div class="event-categories" id="eventCategories"></div>
            <div class="left-sidebar-spacer"></div>
            <div class="left-sidebar-footer">
                <button class="help-btn" id="helpBtn" aria-label="Help and resources" title="Help & Resources">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.25" fill="none" />
                        <path
                            d="M5.2 5.3c0-1 0.8-1.7 1.8-1.7s1.8 0.7 1.8 1.6c0 0.8-0.5 1.2-1.2 1.6-0.5 0.3-0.6 0.6-0.6 1.1"
                            stroke="currentColor" stroke-width="1.25" stroke-linecap="round" fill="none" />
                        <circle cx="7" cy="10.2" r="0.6" fill="currentColor" />
                    </svg>
                </button>
            </div>
        </aside>
        <div class="calendar-area" id="calendarArea">
            <div class="calendar-header">
                <div class="calendar-top-bar">
                    <div class="calendar-top-left">
                        <div class="calendar-toolbar" id="calendarToolbar" style="display:none">
                            <button class="toolbar-icon-btn" id="toggleSidebarAlt" aria-label="Toggle sidebar">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor"
                                        stroke-width="1.25" fill="none" />
                                    <line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.25" />
                                </svg>
                            </button>
                            <button class="toolbar-icon-btn" id="searchBtnAlt" aria-label="Search">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" />
                                    <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="calendar-top-right">
                        <a href="webcal://calendar.ntuas.com/subscribe" class="btn-subscribe">Subscribe</a>
                        <button class="btn-copy" id="copyBtn">Copy URL</button>
                        <a href="/admin" class="admin-link">Admin</a>

                        <div class="nav-month-arrows">
                            <button id="prevMonth" aria-label="Previous Month">

            </div>
            <div class="scroll-container" id="scrollContainer">
                <div class="sentinel" id="sentinelTop"></div>
                <div class="sentinel" id="sentinelBottom"></div>

        </div>
        <aside class="sidebar" id="rightSidebar">
            <!-- Default view: Upcoming Events -->
            <div id="upcomingEventsView">
                <h3>Upcoming Events</h3>
                <div id="eventsList">
                    <div class="no-events">Loading events...</div>
                </div>
            </div>
            <!-- Event detail view (hidden by default) -->
            <div id="eventDetailView" style="display:none">
                <div class="sidebar-detail-header">
                    <button class="sidebar-back-btn" id="backToUpcoming" aria-label="Back to upcoming events">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
