<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NTUAS Club Event Calendar. View upcoming events, workshops, and seminars.">
    <meta property="og:title" content="NTUAS | Club Event Calendar">
    <meta property="og:description" content="NTUAS Club Event Calendar. View upcoming events, workshops, and seminars.">
    <meta property="og:image" content="https://calendar.ntuas.com/apple-touch-icon.png">
    <meta property="og:url" content="https://calendar.ntuas.com/">
    <meta property="og:type" content="website">
    <title>NTUAS | Club Event Calendar</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Brand & primary — Notion blue (DESIGN.md link-blue token) */
            --color-primary: #0075de;
            --color-primary-pressed: #005bab;
            --on-primary: #ffffff;
            --link-blue: #0075de;
            --link-blue-pressed: #005bab;

            /* Brand spectrum + card tints (echo product database properties) */
            --brand-pink: #ff64c8;
            --brand-orange: #dd5b00;
            --brand-purple: #7b3ff2;
            --brand-teal: #2a9d99;
            --brand-green: #1aae39;
            --brand-yellow: #f5d75e;
            --brand-brown: #523410;
            --tint-peach: #ffe8d4;
            --tint-rose: #fde0ec;
            --tint-mint: #d9f3e1;
            --tint-lavender: #e6e0f5;
            --tint-sky: #dcecfa;
            --tint-yellow: #fef7d6;
            --tint-cream: #f8f5e8;

            /* Surfaces */
            --color-canvas: #ffffff;
            --color-surface: #f6f5f4;
            --color-surface-soft: #fafaf9;
            --color-hairline: #e5e3df;
            --color-hairline-soft: #ede9e4;
            --color-hairline-strong: #c8c4be;

            /* Warm-charcoal text hierarchy */
            --color-ink: #1a1a1a;
            --color-charcoal: #37352f;
            --color-slate: #5d5b54;
            --color-steel: #787671;
            --color-stone: #a4a097;
            --color-muted: #bbb8b1;

            /* Semantic */
            --color-success: #1aae39;
            --color-warning: #dd5b00;
            --color-error: #e03131;

            /* Legacy aliases (existing markup/JS consume these) */
            --bg-main: var(--color-canvas);
            --bg-sidebar: var(--color-surface);
            --bg-hover: #efedea;
            --text-primary: var(--color-charcoal);
            --text-secondary: var(--color-slate);
            --text-tertiary: var(--color-steel);
            --accent-red: var(--color-error);
            --accent-red-light: rgba(224, 49, 49, 0.10);
            --accent-blue: var(--link-blue);
            --accent-blue-hover: var(--link-blue-pressed);
            --accent-blue-light: var(--tint-lavender);
            --border: var(--color-hairline);
            --border-strong: var(--color-hairline-strong);

            /* Radius scale (DESIGN.md rounded.*) */
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;

            --left-sidebar-width: 260px;
            --mini-cal-cell: 28px;
            --topbar-height: 44px;
            --month-heading-height: 36px;
            --daynames-height: 32px;
            --header-height: calc(var(--topbar-height) + var(--month-heading-height) + var(--daynames-height));
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Notion Sans', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ─── TOOLBAR ICON BUTTONS ─── */
        .toolbar-icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .toolbar-icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* ─── SIDEBAR TOOLBAR ─── */
        .sidebar-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        /* ─── CALENDAR HEADER (sticky block: controls + month + day names) ─── */
        .calendar-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--bg-main);
            flex-shrink: 0;
        }

        /* ─── CALENDAR TOP BAR (controls row) ─── */
        .calendar-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 8px 16px;
            min-height: var(--topbar-height);
            gap: 8px;
        }

        .calendar-top-left {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        /* ─── MONTH HEADING ROW ─── */
        .month-heading-row {
            padding: 2px 16px 8px 16px;
        }

        .calendar-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .calendar-top-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-month-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-month-arrows {
            display: flex;
            flex-direction: row;
            gap: 2px;
        }

        .nav-month-arrows button {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .nav-month-arrows button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        #monthLabel {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-ink);
            line-height: 1.25;
            letter-spacing: -0.01em;
            user-select: none;
            white-space: nowrap;
        }

        /* DESIGN.md button-secondary — outlined rectangular */
        #todayBtn {
            font-size: 14px;
            font-weight: 500;
            padding: 0 14px;
            border: 1px solid var(--color-hairline-strong);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--color-charcoal);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            height: 32px;
            display: flex;
            align-items: center;
            font-family: inherit;
        }

        #todayBtn:hover {
            background: var(--color-surface);
            color: var(--color-ink);
        }

        /* DESIGN.md button-primary — signature purple rectangular CTA */
        .btn-subscribe {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--color-primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 0 18px;
            height: 32px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            letter-spacing: -0.005em;
        }

        .btn-subscribe:hover {
            background: var(--color-primary-pressed);
        }

        /* DESIGN.md button-secondary — outlined for Copy URL */
        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            color: var(--color-charcoal);
            border: 1px solid var(--color-hairline-strong);
            border-radius: var(--radius-md);
            padding: 0 14px;
            height: 32px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--color-surface);
            color: var(--color-ink);
        }

        .btn-copy.copied {
            border-color: var(--color-success);
            color: var(--color-success);
        }

        /* DESIGN.md button-ghost — quieter inline */
        .admin-link {
            color: var(--color-steel);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
            white-space: nowrap;
        }

        .admin-link:hover {
            color: var(--color-charcoal);
            background: var(--color-surface);
        }

        /* ─── ERROR BANNER ─── */
        .error-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: #cf222e;
            color: #fff;
            font-size: 13px;
            padding: 8px 16px;
            text-align: center;
        }
        .error-banner.visible { display: block; }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            display: grid;
            grid-template-columns: var(--left-sidebar-width) 1fr 280px;
            flex: 1;
            overflow: hidden;
        }

        /* ─── LEFT SIDEBAR ─── */
        .left-sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .mini-cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .mini-cal-month-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            user-select: none;
        }

        .mini-cal-nav-group {
            display: flex;
            gap: 2px;
        }

        .mini-cal-nav {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .mini-cal-nav:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .mini-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, var(--mini-cal-cell));
            gap: 1px 0;
        }

        .mini-cal-day-name {
            width: var(--mini-cal-cell);
            height: var(--mini-cal-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-tertiary);
            user-select: none;
        }

        .mini-cal-day {
            width: var(--mini-cal-cell);
            height: var(--mini-cal-cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.12s;
            user-select: none;
        }

        .mini-cal-day:hover:not(.today) {
            background: var(--bg-hover);
        }

        .mini-cal-day.other-month {
            color: var(--text-tertiary);
        }

        .mini-cal-day.today {
            background: var(--accent-red);
            color: #fff;
            font-weight: 600;
        }

        /* ─── EVENT CATEGORIES ─── */
        .event-categories {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            margin: 0 -8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            user-select: none;
            transition: background 0.12s;
        }

        .category-item:hover {
            background: var(--bg-hover);
        }

        .category-item.inactive .category-label {
            color: var(--text-tertiary);
        }

        .category-icon {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex-shrink: 0;
            background: var(--cat-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s;
        }

        .category-icon svg {
            width: 10px;
            height: 10px;
            color: #fff;
            transition: opacity 0.12s;
        }

        .category-item.inactive .category-icon svg {
            opacity: 0;
        }

        .category-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ─── LEFT SIDEBAR FOOTER ─── */
        .left-sidebar-spacer {
            flex: 1;
            min-height: 16px;
        }

        .left-sidebar-footer {
            border-top: 1px solid var(--border);
            margin: 0 -16px;
            padding: 8px 16px;
        }

        .help-btn-wrap {
            position: relative;
            display: inline-flex;
        }

        .help-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 10px;
            color: #b0b0ad;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, color 0.15s;
        }

        .help-btn:hover {
            background: #f5f5f5;
        }

        /* Notion-style tooltip */
        .help-tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            transform: translateY(4px);
            background: #2f2f2f;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            padding: 5px 10px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            z-index: 9999;
            letter-spacing: 0.01em;
        }

        .help-btn-wrap:hover .help-tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        .help-btn-wrap.menu-open .help-tooltip {
            opacity: 0;
            pointer-events: none;
        }

        .help-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            min-width: 220px;
            background: #2f2f2f;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.06);
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
            transition: opacity 0.15s, transform 0.15s;
            z-index: 10000;
        }

        .help-menu.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .help-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.1s;
        }

        .help-menu-item:hover {
            background: rgba(255,255,255,0.1);
        }

        /* ─── CALENDAR AREA ─── */
        .calendar-area {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-anchor: auto;
            padding: 0;
            position: relative;
            scroll-snap-type: y proximity;
            scroll-padding-top: var(--header-height);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .calendar-area::-webkit-scrollbar {
            display: none;
        }

        /* ─── DAY NAMES ROW (inside sticky header) ─── */
        .day-names-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
        }

        /* DESIGN.md micro-uppercase typography */
        .calendar-day-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-steel);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 12px;
            user-select: none;
            text-align: center;
        }

        /* ─── SCROLL CONTAINER ─── */
        .scroll-container {
            flex: 1;
        }

        /* ─── (month sections removed for continuous grid) ─── */

        /* ─── WEEK ROW ─── */
        .week-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            scroll-snap-align: start;
        }

        /* ─── SENTINEL ─── */
        .sentinel {
            height: 1px;
            overflow-anchor: none;
        }

        /* ─── CALENDAR DAY ─── */
        .calendar-day {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.12s;
            overflow: hidden;
            position: relative;
            /* 6 rows: fill available height */
            height: calc((100vh - var(--header-height)) / 6);
            min-height: 80px;
        }

        .calendar-day:nth-child(7) {
            border-right: none;
        }

        .calendar-day.other-month-day .day-number {
            color: rgba(17, 17, 17, 0.32);
        }

        .calendar-day.weekend-day {
            background: rgba(0, 0, 0, 0.018);
        }

        .calendar-day.weekend-day:hover {
            background: var(--bg-hover);
        }

        .calendar-day.other-month-day.weekend-day {
            background: rgba(0, 0, 0, 0.03);
        }

        .calendar-day:hover {
            background: var(--bg-hover);
        }

        /* Sky tint for soft selection — harmonizes with blue primary */
        .calendar-day.selected {
            background: var(--tint-sky);
        }

        .calendar-day.selected:hover {
            background: #c9dff5;
        }

        .day-number {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-charcoal);
            line-height: 1;
            margin-bottom: 4px;
            align-self: flex-end;
        }

        .day-number.first-of-month,
        .today-marker.first-of-month {
            font-weight: 600;
            color: var(--color-ink);
        }

        /* Today badge — DESIGN.md semantic-error red, rounded.sm */
        .today-marker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: var(--radius-sm);
            background: var(--color-error);
            color: var(--on-primary);
            font-weight: 600;
            font-size: 12px;
            line-height: 1;
            margin-bottom: 4px;
            align-self: flex-end;
        }

        /* DESIGN.md badge-tag — soft pastel chip with strong category-toned text */
        .event-chip {
            font-size: 11px;
            padding: 2px 6px;
            background: var(--tint-sky);
            color: var(--color-charcoal);
            border-radius: var(--radius-xs);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
            line-height: 1.4;
            font-weight: 500;
            letter-spacing: -0.005em;
        }

        .event-chip-more {
            font-size: 11px;
            color: var(--color-steel);
            margin-top: 2px;
            padding-left: 2px;
            font-weight: 500;
        }

        /* ─── SIDEBAR DETAIL VIEW ─── */
        .sidebar-detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        /* DESIGN.md button-link — inline blue text */
        .sidebar-back-btn {
            background: none;
            border: none;
            color: var(--link-blue);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }

        .sidebar-back-btn:hover {
            color: var(--link-blue-pressed);
        }

        #eventDetailView .detail-date-heading {
            font-size: 11px;
            margin-bottom: 10px;
        }

        #eventDetailView .detail-row {
            flex-direction: column;
            gap: 2px;
        }

        #eventDetailView .detail-label {
            min-width: unset;
        }

        /* DESIGN.md micro-uppercase */
        .detail-date-heading {
            font-size: 11px;
            color: var(--color-steel);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--color-hairline);
        }

        .detail-event-card {
            margin-bottom: 16px;
        }

        .detail-event-card:last-child {
            margin-bottom: 0;
        }

        .detail-event-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* DESIGN.md badge-tag-* — soft pastel chip family */
        .detail-badge {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-confirmed {
            background: var(--tint-mint);
            color: #0a6e1f;
        }

        .badge-tentative {
            background: var(--tint-peach);
            color: #793400;
        }

        .badge-cancelled {
            background: var(--tint-rose);
            color: #a02e6d;
        }

        .detail-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 4px;
            font-size: 13px;
            line-height: 1.5;
        }

        .detail-label {
            color: var(--text-tertiary);
            font-weight: 500;
            min-width: 64px;
            font-size: 12px;
        }

        .detail-value {
            color: var(--text-primary);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .detail-value a {
            color: var(--link-blue);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-color: rgba(0, 117, 222, 0.3);
        }

        .detail-value a:hover {
            text-decoration-color: var(--link-blue);
        }

        /* ─── RIGHT SIDEBAR ─── */
        .sidebar {
            background: #ffffff;
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        /* DESIGN.md micro-uppercase */
        .sidebar h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-steel);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 12px 0;
        }

        .event-item {
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.12s;
            margin: 0 -8px;
        }

        .event-item:hover {
            background: var(--bg-hover);
        }

        .event-item+.event-item {
            border-top: 1px solid var(--border);
        }

        .event-date {
            color: var(--text-tertiary);
            font-weight: 500;
            font-size: 11px;
            margin-bottom: 2px;
        }

        .event-title {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 13px;
        }

        .no-events {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1099px) {
            .left-sidebar {
                display: none;
            }

            .main-content {
                grid-template-columns: 1fr 280px;
            }

            .calendar-toolbar {
                display: flex !important;
            }
        }

        @media (max-width: 899px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 240px;
            }

            .calendar-day {
                min-height: 64px;
            }
        }

        @media (max-width: 599px) {
            .calendar-top-bar {
                flex-wrap: wrap;
                padding: 6px 12px;
                gap: 6px;
            }

            .calendar-area {
                padding: 0;
            }

            .calendar-day {
                min-height: 48px;
                padding: 4px;
            }

            .event-chip {
                display: none;
            }

            .event-chip-more {
                display: none;
            }

            /* Fallback dot indicator on mobile */
            .calendar-day.has-event .day-number::after {
                content: '';
                display: inline-block;
                width: 4px;
                height: 4px;
                background: var(--accent-blue);
                border-radius: 50%;
                margin-left: 3px;
                vertical-align: middle;
            }

            .calendar-day.has-event .today-marker::after {
                content: '';
                display: inline-block;
                width: 4px;
                height: 4px;
                background: #fff;
                border-radius: 50%;
                margin-left: 3px;
                vertical-align: middle;
            }

            #monthLabel {
                font-size: 18px;
            }
        }

        /* ─── SEARCH OVERLAY ─── */
        .search-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 18vh;
            background: rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .search-modal {
            width: 540px;
            max-width: calc(100vw - 32px);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.16), 0 0 0 1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transform: translateY(-12px) scale(0.98);
            transition: transform 0.2s ease;
        }

        .search-overlay.active .search-modal {
            transform: translateY(0) scale(1);
        }

        .search-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-input-row svg {
            color: var(--text-tertiary);
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 17px;
            font-weight: 400;
            color: var(--text-primary);
            background: transparent;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-input-clear {
            width: 20px;
            height: 20px;
            border: none;
            background: var(--text-tertiary);
            color: #fff;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
            line-height: 1;
        }

        .search-input-clear.visible {
            display: flex;
        }

        .search-results {
            max-height: 340px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .search-results::-webkit-scrollbar {
            width: 6px;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        .search-section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 10px 16px 4px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .search-result-item:hover,
        .search-result-item.focused {
            background: var(--bg-hover);
        }

        .search-result-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--accent-blue);
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-result-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-empty {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .search-hint {
            padding: 8px 16px 12px;
            font-size: 12px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-hint kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-hover);
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            font-family: inherit;
            font-size: 10px;
            min-width: 20px;
            height: 18px;
            padding: 0 4px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="error-banner" id="errorBanner">Could not load calendar events. Please check your connection and refresh.</div>
    <div class="main-content">
        <aside class="left-sidebar" id="leftSidebar">
            <div class="sidebar-toolbar">
                <button class="toolbar-icon-btn" id="toggleSidebar" aria-label="Toggle sidebar">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.25"
                            fill="none" />
                        <line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.25" />
                    </svg>
                </button>
                <button class="toolbar-icon-btn" id="searchBtn" aria-label="Search">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" />
                        <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="mini-cal-header">
                <span class="mini-cal-month-label" id="miniCalMonth">Loading...</span>
                <div class="mini-cal-nav-group">
                    <button class="mini-cal-nav" id="miniCalPrev" aria-label="Previous month">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                            <path d="M2 7L5 3L8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <button class="mini-cal-nav" id="miniCalNext" aria-label="Next month">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                            <path d="M2 3L5 7L8 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="mini-cal-grid" id="miniCalGrid"></div>
            <div class="event-categories" id="eventCategories"></div>
            <div class="left-sidebar-spacer"></div>
            <div class="left-sidebar-footer">
                <div class="help-btn-wrap">
                    <button class="help-btn" id="helpBtn" aria-label="Help and resources">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2" fill="none" />
                            <path d="M6 6.2c0-1.1 0.9-1.9 2-1.9s2 0.8 2 1.8c0 0.9-0.6 1.4-1.3 1.8C8.2 8.2 8 8.6 8 9.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none" />
                            <circle cx="8" cy="11.2" r="0.65" fill="currentColor" />
                        </svg>
                    </button>
                    <div class="help-tooltip">Help and resources</div>
                    <div class="help-menu" id="helpMenu">
                        <a class="help-menu-item" href="https://www.instagram.com/ntu_astro/" target="_blank" rel="noopener noreferrer">
                            Follow @ntu_astro on Instagram
                        </a>
                    </div>
                </div>
            </div>
        </aside>
        <div class="calendar-area" id="calendarArea">
            <div class="calendar-header">
                <div class="calendar-top-bar">
                    <div class="calendar-top-left">
                        <div class="calendar-toolbar" id="calendarToolbar" style="display:none">
                            <button class="toolbar-icon-btn" id="toggleSidebarAlt" aria-label="Toggle sidebar">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor"
                                        stroke-width="1.25" fill="none" />
                                    <line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.25" />
                                </svg>
                            </button>
                            <button class="toolbar-icon-btn" id="searchBtnAlt" aria-label="Search">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" />
                                    <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="calendar-top-right">
                        <a href="webcal://calendar.ntuas.com/subscribe" class="btn-subscribe">Subscribe</a>
                        <button class="btn-copy" id="copyBtn">Copy URL</button>
                        <a href="/admin" class="admin-link">Admin</a>
                        <button id="todayBtn">Today</button>
                        <div class="nav-month-arrows">
                            <button id="prevMonth" aria-label="Previous Month">
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                                    <path d="M2 7L5 3L8 7" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </button>
                            <button id="nextMonth" aria-label="Next Month">
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                                    <path d="M2 3L5 7L8 3" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="month-heading-row">
                    <span id="monthLabel"></span>
                </div>
                <div class="day-names-row" id="dayNamesRow"></div>
            </div>
            <div class="scroll-container" id="scrollContainer">
                <div class="sentinel" id="sentinelTop"></div>
                <div class="sentinel" id="sentinelBottom"></div>
            </div>
        </div>
        <aside class="sidebar" id="rightSidebar">
            <!-- Default view: Upcoming Events -->
            <div id="upcomingEventsView">
                <h3>Upcoming Events</h3>
                <div id="eventsList">
                    <div class="no-events">Loading events...</div>
                </div>
            </div>
            <!-- Event detail view (hidden by default) -->
            <div id="eventDetailView" style="display:none">
                <div class="sidebar-detail-header">
                    <button class="sidebar-back-btn" id="backToUpcoming" aria-label="Back to upcoming events">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Upcoming Events
                    </button>
                </div>
                <div id="eventDetailContent"></div>
            </div>
        </aside>
    </div>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-modal" id="searchModal">
            <div class="search-input-row">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" />
                    <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search events" autocomplete="off"
                    spellcheck="false">
                <button class="search-input-clear" id="searchClear" aria-label="Clear search">&times;</button>
            </div>
            <div class="search-results" id="searchResults"></div>
            <div class="search-hint">
                <kbd>esc</kbd> to close
            </div>
        </div>
    </div>

    <script type="module" src="/dist/index.js"></script>
</body>

</html>
